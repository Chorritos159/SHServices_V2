# =====================================================================
# Promtail · Recolector de logs de contenedores → Loki
# ---------------------------------------------------------------------
# Descubre TODOS los contenedores Docker vía el socket y envía sus logs
# a Loki. Grafana (en :3000) los consulta como datasource.
# =====================================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: contenedores-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Nombre del contenedor como etiqueta "container" (quita el "/" inicial).
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Imagen como etiqueta útil para filtrar en Grafana.
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      # Etiqueta fija del stack.
      - target_label: 'stack'
        replacement: 'shservices'
