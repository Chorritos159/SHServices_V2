# Provider de dashboards provisionados. Carga los .json de esta misma carpeta.
apiVersion: 1

providers:
  - name: "SHServices"
    orgId: 1
    folder: "SHServices"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
