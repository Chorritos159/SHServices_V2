# =====================================================================
# Prometheus - Configuración de scraping para SHServices
# Los targets usan el NOMBRE DE CONTENEDOR y el PUERTO INTERNO (80),
# resueltos por el DNS interno de la red 'shservices-net'.
# =====================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # El propio Prometheus (útil para verificar que vive)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API Gateway (expone /metrics gracias al Instrumentator)
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:80"]

  # Ticket Service
  - job_name: "ticket-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["ticket-service:80"]

  # Auditoría (traza de eventos) y Notificaciones (Fase 4, S34)
  - job_name: "auditoria-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auditoria-service:80"]

  - job_name: "notificacion-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["notificacion-service:80"]

  # RabbitMQ (plugin rabbitmq_prometheus): queue depth y consumer count
  # para las evidencias de observabilidad de la S34 (pág. 16/18).
  # /metrics/per-object (no /metrics) es el endpoint con desglose POR COLA
  # (label "queue"); el endpoint por defecto solo trae agregados globales.
  - job_name: "rabbitmq"
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ["rabbitmq:15692"]
