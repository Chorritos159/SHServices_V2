# Configuración del análisis estático (SonarQube).
# Sin este archivo, el escáner falla con "sonar.projectKey is mandatory".
# Uso: ver README.md → "Análisis estático con SonarQube".

sonar.projectKey=shservices-v2
sonar.projectName=SHServices V2
sonar.projectVersion=2.5

# Código a analizar: los 8 microservicios + el frontend.
sonar.sources=api_gateway,auth_service,ticket_service,almacen_service,diagnostico_service,facturacion_service,auditoria_service,notificacion_service,frontend/src
sonar.sourceEncoding=UTF-8

# Fuera del análisis: dependencias, artefactos de build y datos de pruebas.
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/.next/**,**/venv/**,pruebas/resultados/**

# base_service es una plantilla de referencia (no se despliega); las pruebas
# de carga/caos son herramientas de verificación, no código de producción.
sonar.python.version=3.11

# ── Duplicación: exclusión DELIBERADA y justificada ──────────────────────
#
# `app/core/` (logger, exceptions, database, rabbitmq) está replicado en los 8
# servicios a propósito, no por descuido. Es la consecuencia declarada de
# ADR-0001: los servicios NO comparten una librería común para poder
# desplegarse, versionarse y fallar de forma independiente. Publicar `app/core`
# como paquete compartido crearía justo el acoplamiento de despliegue que la
# arquitectura evita — un cambio en el logger obligaría a re-desplegar los 8.
#
# Medido: `exceptions.py` (9 copias) y `logger.py` (9 copias) son ~90% de las
# líneas duplicadas del proyecto. Sin esta exclusión, el detector de copias
# reporta como deuda una decisión de arquitectura consciente y documentada.
#
# Esto NO oculta duplicación real: la duplicación DENTRO de la lógica de
# negocio de cada servicio se sigue midiendo y sigue contando.
# Se incluye `app/api/health.py` por la MISMA razón: es el health check + el
# endpoint de caos, infraestructura por servicio (no lógica de negocio), y está
# replicado en los 7 por la misma decisión. Medido: 52 de sus 64 líneas.
sonar.cpd.exclusions=**/app/core/**,**/app/api/health.py,base_service/**

# Cobertura de los tests unitarios (pytest). Generar antes de analizar con:
#   python -m pytest tests/ --cov=api_gateway/app/core --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml
sonar.tests=tests
sonar.test.inclusions=tests/**
