# =====================================================================
# SHServices V2 - Orquestación completa de microservicios
# ---------------------------------------------------------------------
# Reglas aplicadas:
#  - SOLO api_gateway expone puerto al host (8000 -> 80).
#  - restart: always en TODOS los servicios (auto-healing / caos).
#  - depends_on con condition: service_healthy para BD y RabbitMQ.
#  - Toxiproxy intercepta el tráfico Gateway -> ticket_service.
# (Se omite "version:" a propósito: Compose v2 lo considera obsoleto.)
# =====================================================================

# Nombre de proyecto EXPLÍCITO (S34, hallazgo en verificación de Fase 1):
# esta carpeta se llama igual que la del otro proyecto en el mismo equipo
# (SHServices_V2), y ambos docker-compose.yml fijan los mismos container_name.
# Sin "name:", Compose deriva el project name del directorio -> los dos
# proyectos colisionan (mismos nombres de volumen, red y detección de
# huérfanos), lo que ya causó una recreación cruzada de contenedores y un
# volumen de Postgres compartido entre ambos. Fijar el nombre aquí aísla
# los volúmenes/redes/orphan-detection de este proyecto permanentemente.
name: shservices_yassir

networks:
  shservices-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  # SonarQube (perfil "analisis"): persisten el proyecto y el historial de
  # análisis entre corridas del escáner.
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

services:

  # ------------------------------------------------------------------
  # INFRAESTRUCTURA
  # ------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    # Configuración de alto rendimiento para base de datos (sustentación/pruebas de carga):
    # - max_connections=500: soporta la concurrencia de múltiples workers.
    # - synchronous_commit=off: commit asíncrono para no bloquear en I/O de disco.
    # - fsync=off / full_page_writes=off: desactiva flushes físicos síncronos (máxima velocidad).
    # - shared_buffers=1024MB: amplia la caché en RAM para lecturas/escrituras.
    command: ["postgres", "-c", "max_connections=800", "-c", "synchronous_commit=off", "-c", "fsync=off", "-c", "full_page_writes=off", "-c", "shared_buffers=1024MB", "-c", "work_mem=32MB"]
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Falta POSTGRES_USER en .env — copia .env.example a .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Falta POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:?Falta POSTGRES_DB en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shservices-net
    # NOTA: sin "ports". La BD NO se expone al host en producción.
    # (Si necesitas conectarte con DBeaver en local, descomenta:)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shservices_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Falta RABBITMQ_DEFAULT_USER en .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Falta RABBITMQ_DEFAULT_PASS en .env}
    # Habilita rabbitmq_prometheus (S34, Fase 4: queue depth y consumer lag)
    # con un comando, NO montando /etc/rabbitmq/enabled_plugins: ese bind
    # mount resultaba ilegible dentro del contenedor
    # (cannot_read_enabled_plugins_file ... :eio) y, al no poder leer el
    # archivo, RabbitMQ se quedaba SIN rabbitmq_management -> el panel
    # web devolvía "Management API returned status code 500".
    # `--offline` habilita el plugin antes de arrancar el broker.
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
             exec docker-entrypoint.sh rabbitmq-server"
    networks:
      - shservices-net
    # Panel de administración web (útil para la demo del docente).
    # Si tu regla estricta lo prohíbe, comenta este bloque.
    ports:
      - "15672:15672"
      - "15692:15692"   # rabbitmq_prometheus (queue depth, consumer count)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ------------------------------------------------------------------
  # BASE DE DATOS DE CACHE / ESTADO COMPARTIDO: Redis
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - shservices-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ------------------------------------------------------------------
  # INGENIERÍA DEL CAOS: Toxiproxy
  # Intercepta el tráfico hacia ticket_service para simular fallos.
  # ------------------------------------------------------------------
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    container_name: toxiproxy
    restart: always
    ports:
      - "8474:8474"      # API de control (para inyectar toxinas)
    volumes:
      - ./toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json"]
    networks:
      - shservices-net

  # ------------------------------------------------------------------
  # API GATEWAY  (ÚNICO punto de entrada público)
  # ------------------------------------------------------------------
  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: ../Dockerfile
    container_name: api-gateway
    restart: always
    # 8 workers (para alto rendimiento en i9): el circuit breaker y sus métricas
    # se sincronizan en Redis para evitar inconsistencias ("parpadeo").
    # Se limpia el directorio de metricas ANTES de arrancar: si quedaran los
    # ficheros de un contenedor anterior, los contadores empezarian con valores
    # heredados de procesos muertos. Hacerlo aqui y no en el codigo Python es
    # deliberado: app/main.py lo importa cada worker, y limpiar ahi hacia que
    # cada uno borrase lo que los demas ya habian escrito.
    # FORMA DE LISTA a proposito. Con `command: >` y comillas anidadas, Compose
    # partia mal los argumentos y gunicorn arrancaba con TODOS sus valores por
    # defecto (127.0.0.1:8000, worker sync, 1 worker) ignorando las banderas:
    # el Gateway quedaba inalcanzable y "unhealthy". La forma de lista pasa
    # cada argumento tal cual, sin que nadie lo reinterprete.
    command:
      - sh
      - -c
      - rm -f /tmp/prometheus/*.db 2>/dev/null; exec gunicorn app.main:app --workers 8 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:80 --timeout 30
    environment:
      # Debe ser idéntica en auth-service y api-gateway o los tokens no validan.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Falta JWT_SECRET_KEY en .env}
      CORS_ORIGINS: ${CORS_ORIGINS:?Falta CORS_ORIGINS en .env}
      # El Gateway persiste aquí su outbox transaccional (store-and-forward):
      # las escrituras que no pudieron entregarse a un servicio caído.
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      # Redis compartido para el circuit breaker:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Prometheus en modo MULTIPROCESO: con 8 workers, cada proceso tenia su
      # propio registro y /metrics devolvia solo el del worker que contestaba,
      # asi que los contadores subestimaban (medido: 30 enviadas, 21 leidas).
      # Con este directorio compartido, las muestras se agregan al scrapear.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
      # Rate limit del Gateway (Fase 5, S34): se amplía temporalmente en las
      # pruebas de carga 500k/1M para medir el throughput real del backend.
      # `docker compose up -d api-gateway` no pasa el default si la var no
      # está exportada en el shell -> caen a los defaults del código (20/40).
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      # Vacío = cupo normal del bulkhead. Las pruebas de carga lo amplían
      # temporalmente para atender TODAS las peticiones (sin 503 de bulkhead).
      BULKHEAD_LIMITE_OVERRIDE: ${BULKHEAD_LIMITE_OVERRIDE:-}
      # Modo carga: subir timeouts y apagar el breaker para medir throughput
      # crudo (atender todas). Defaults = producción (timeout normal, breaker ON).
      TIMEOUT_FACTOR: ${TIMEOUT_FACTOR:-1}
      CIRCUIT_BREAKER_DISABLED: ${CIRCUIT_BREAKER_DISABLED:-}
    tmpfs:
      # En RAM: son archivos de metricas efimeros, se regeneran en cada
      # arranque y no deben persistir entre contenedores.
      - /tmp/prometheus
    ports:
      - "8000:80"        # <-- ÚNICO mapeo al host
    networks:
      - shservices-net
    depends_on:
      redis:
        condition: service_healthy
      # service_started (no _healthy) para que el Gateway arranque
      # aunque un microservicio esté caído (así pruebas el Circuit Breaker).
      auth-service:
        condition: service_started
      toxiproxy:
        condition: service_started
      # El outbox necesita la BD; esperamos a que Postgres esté sano.
      postgres-db:
        condition: service_healthy

  # ------------------------------------------------------------------
  # AUTH SERVICE  (genera los JWT) - sin BD ni RabbitMQ
  # ------------------------------------------------------------------
  auth-service:
    build:
      context: ./auth_service
      dockerfile: ../Dockerfile
    container_name: auth-service
    restart: always
    environment:
      # MISMA llave que api-gateway (imprescindible para que los JWT validen).
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Falta JWT_SECRET_KEY en .env}
      # Persistencia de usuarios en PostgreSQL (seed automático si la tabla está vacía).
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      # Demo de auto-healing (S34). Apagado por defecto en el codigo;
      # se enciende AQUI a proposito para la sustentacion. En produccion
      # esta linea no existiria y /_chaos/crash devolveria 404.
      CHAOS_ENABLED: "true"
    networks:
      - shservices-net
    # SIN puerto publicado (hallazgo 3 de OWASP, CERRADO el 2026-07-18).
    #
    # Antes publicaba el 8003 porque el Gateway bloqueaba /api/v1/auth/* y el
    # frontend tenia que hablarle directo. Eso dejaba el login fuera del punto
    # de entrada unico: sin rate limit, sin circuit breaker y alcanzable desde
    # el host saltandose el Gateway.
    #
    # Ahora el login va por POST http://localhost:8000/api/v1/auth/login y su
    # Swagger se lee en http://localhost:8000/docs-todos, asi que ya no hay
    # ninguna razon para abrir este puerto.
    depends_on:
      postgres-db:
        condition: service_healthy

  # ------------------------------------------------------------------
  # FRONTEND (Next.js) — la aplicación web, en modo PRODUCCIÓN
  #
  # Cierra la brecha #9. Antes quedaba fuera del compose y había que
  # levantarlo aparte con `npm run dev`, así que el sistema NO se levantaba
  # con un solo comando y la web corría en modo desarrollo.
  #
  # Habla con el Gateway por el NOMBRE DE RED (`api-gateway:80`), no por
  # localhost: dentro de Docker, `localhost` es el propio contenedor. Y como
  # el navegador solo llama al BFF de Next (mismo origen), el JWT sigue sin
  # salir nunca de la cookie HttpOnly.
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # `shservices-frontend` y no `frontend` a secas: el nombre `frontend` es
    # demasiado genérico y ya lo ocupa otra copia del proyecto en esta misma
    # máquina. Docker exige nombres únicos por host, no por proyecto.
    container_name: shservices-frontend
    restart: always
    environment:
      # Nombre de servicio en la red Docker, no localhost.
      GATEWAY_URL: http://api-gateway:80
      # La MISMA clave que el Gateway y el auth-service: el BFF verifica la
      # firma del token antes de fiarse del rol que trae dentro.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Falta JWT_SECRET_KEY en .env}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sh_session}
    ports:
      - "3001:3001"
    networks:
      - shservices-net
    depends_on:
      api-gateway:
        condition: service_healthy

  # ------------------------------------------------------------------
  # TICKET SERVICE  (CRUD tickets) - BD + RabbitMQ
  # ------------------------------------------------------------------
  ticket-service:
    build:
      context: ./ticket_service
      dockerfile: ../Dockerfile
    container_name: ticket-service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      CHAOS_ENABLED: "true"
      DB_POOL_SIZE: 30
      DB_POOL_MAX_OVERFLOW: 15
      DB_POOL_TIMEOUT: 15
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--workers", "4"]
    ports:
      - "8001:80"   # Swagger en http://localhost:8001/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ------------------------------------------------------------------
  # ALMACEN SERVICE  (inventario) - BD
  # ------------------------------------------------------------------
  almacen-service:
    build:
      context: ./almacen_service
      dockerfile: ../Dockerfile
    container_name: almacen-service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      # Publica ProductoRegistrado para el servicio de notificaciones.
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      CHAOS_ENABLED: "true"
      DB_POOL_SIZE: 30
      DB_POOL_MAX_OVERFLOW: 15
      DB_POOL_TIMEOUT: 15
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--workers", "4"]
    ports:
      - "8002:80"   # Swagger en http://localhost:8002/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ------------------------------------------------------------------
  # DIAGNOSTICO SERVICE  (orquesta tickets<->almacen) - BD + RabbitMQ
  # ------------------------------------------------------------------
  diagnostico-service:
    build:
      context: ./diagnostico_service
      dockerfile: ../Dockerfile
    container_name: diagnostico-service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      CHAOS_ENABLED: "true"
      DB_POOL_SIZE: 30
      DB_POOL_MAX_OVERFLOW: 15
      DB_POOL_TIMEOUT: 15
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--workers", "4"]
    ports:
      - "8004:80"   # Swagger en http://localhost:8004/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ------------------------------------------------------------------
  # FACTURACION SERVICE  (boletas) - BD + RabbitMQ
  # ------------------------------------------------------------------
  facturacion-service:
    build:
      context: ./facturacion_service
      dockerfile: ../Dockerfile
    container_name: facturacion-service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      CHAOS_ENABLED: "true"
      DB_POOL_SIZE: 30
      DB_POOL_MAX_OVERFLOW: 10
      DB_POOL_TIMEOUT: 15
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--workers", "4"]
    ports:
      - "8005:80"   # Swagger en http://localhost:8005/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ------------------------------------------------------------------
  # AUDITORIA SERVICE  (consumidor de eventos) - RabbitMQ
  # ------------------------------------------------------------------
  auditoria-service:
    build:
      context: ./auditoria_service
      dockerfile: ../Dockerfile
    container_name: auditoria-service
    restart: always
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      # Fase 4 (FF-DEP-07): auditoría persiste la traza de eventos en PostgreSQL.
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      # Demo de auto-healing (S34). Apagado por defecto en el codigo;
      # se enciende AQUI a proposito para la sustentacion. En produccion
      # esta linea no existiria y /_chaos/crash devolveria 404.
      CHAOS_ENABLED: "true"
      # Pool MAS GRANDE que el resto: este servicio hace doble trabajo en el
      # mismo proceso —atiende la API HTTP y consume eventos de RabbitMQ— y el
      # consumidor abre una sesion por notificacion. Bajo carga, el consumidor
      # y la API compiten por el mismo pool y lo agotan: la corrida con k6 dio
      # "PoolTimeout / Pool de conexiones agotado" en GET /mis-alertas y el
      # circuito de 'notificaciones' llego a abrirse.
      DB_POOL_SIZE: "25"
      DB_POOL_MAX_OVERFLOW: "25"
    ports:
      - "8006:80"   # Swagger en http://localhost:8006/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres-db:
        condition: service_healthy

  # ------------------------------------------------------------------
  # NOTIFICACION SERVICE  (alertas internas por rol) - BD + RabbitMQ
  # Consume ticket.creado y producto.registrado; enruta a ADMIN/TECNICO.
  # ------------------------------------------------------------------
  notificacion-service:
    build:
      context: ./notificacion_service
      dockerfile: ../Dockerfile
    container_name: notificacion-service
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?Falta DATABASE_URL en .env}
      RABBITMQ_URL: ${RABBITMQ_URL:?Falta RABBITMQ_URL en .env}
      # Secreto para firmar los webhooks salientes (HMAC-SHA256). El receptor
      # recalcula la firma con este mismo valor para verificar autenticidad.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-webhook_secreto_demo_shservices}
      # Demo de auto-healing (S34). Apagado por defecto en el codigo;
      # se enciende AQUI a proposito para la sustentacion. En produccion
      # esta linea no existiria y /_chaos/crash devolveria 404.
      CHAOS_ENABLED: "true"
      # Pool MAS GRANDE que el resto: este servicio hace doble trabajo en el
      # mismo proceso —atiende la API HTTP y consume eventos de RabbitMQ— y el
      # consumidor abre una sesion por notificacion. Bajo carga, el consumidor
      # y la API compiten por el mismo pool y lo agotan: la corrida con k6 dio
      # "PoolTimeout / Pool de conexiones agotado" en GET /mis-alertas y el
      # circuito de 'notificaciones' llego a abrirse.
      DB_POOL_SIZE: "25"
      DB_POOL_MAX_OVERFLOW: "25"
    # Permite que los webhooks lleguen a un receptor corriendo en el HOST
    # (p. ej. http://host.docker.internal:9100 para probar en local).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8007:80"   # Swagger en http://localhost:8007/docs (solo demo)
    networks:
      - shservices-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ------------------------------------------------------------------
  # OBSERVABILIDAD: Prometheus + Grafana
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      # Monta tu archivo de configuración dentro del contenedor (solo lectura).
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - shservices-net
    depends_on:
      - api-gateway
      - ticket-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    environment:
      # Credenciales del panel de Grafana para la sustentación.
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:?Falta GF_SECURITY_ADMIN_USER en .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Falta GF_SECURITY_ADMIN_PASSWORD en .env}
    volumes:
      # Persiste dashboards y datasources entre reinicios.
      - grafana_data:/var/lib/grafana
      # Provisiona automáticamente los datasources (Loki + Prometheus) y el
      # dashboard de resiliencia (Fase 4, S34) — versionado en el repo, no
      # se arma a mano en la UI.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - shservices-net
    depends_on:
      - prometheus
      - loki

  # ------------------------------------------------------------------
  # OBSERVABILIDAD DE LOGS: Grafana Loki + Promtail
  # Loki agrega los logs; Promtail los recolecta de TODOS los contenedores.
  # ------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - shservices-net
    # (Opcional para depurar desde el host)
    # ports:
    #   - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    volumes:
      # Acceso a los logs y al socket para descubrir contenedores.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    networks:
      - shservices-net
    depends_on:
      - loki

  # ------------------------------------------------------------------
  # LOGS EN VIVO: Dozzle
  # Loki+Grafana son para BUSCAR en el historial (filtrar por correlationId,
  # correlacionar con métricas). Dozzle es para MIRAR los logs fluyendo en
  # tiempo real, sin refrescar nada: se suscribe al socket de Docker y hace
  # streaming vía WebSocket a la UI. Complementario, no reemplazo.
  # ------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    environment:
      # Solo lectura de logs; sin auth para la demo local (no exponer fuera).
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    networks:
      - shservices-net

  # ------------------------------------------------------------------
  # ANÁLISIS ESTÁTICO: SonarQube (perfil "analisis", no arranca por defecto)
  #   docker compose --profile analisis up -d sonarqube
  # Pesa ~1.4 GB y tarda ~2 min en arrancar: por eso queda fuera del
  # levantamiento normal del sistema.
  # ------------------------------------------------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    profiles: ["analisis"]
    restart: unless-stopped
    environment:
      # La demo corre con la BD embebida (H2): suficiente para un análisis
      # puntual, no apto para uso continuo/producción.
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9001:9000"   # 9001 en el host para no chocar con otros servicios
    networks:
      - shservices-net

  # Escáner de SonarQube. Se corre a demanda (no queda levantado):
  #   docker compose --profile analisis run --rm sonar-scanner
  # Va como servicio de compose (y no `docker run -v`) porque el bind mount
  # directo falla cuando el proyecto vive dentro de OneDrive; compose sí
  # resuelve la ruta correctamente.
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: sonar-scanner
    profiles: ["analisis"]
    environment:
      SONAR_HOST_URL: "http://sonarqube:9000"
      # Default vacío a propósito (y NO `${VAR:?...}`): compose interpola las
      # variables de TODOS los servicios aunque su profile no esté activo, así
      # que un `:?` aquí rompería cualquier `docker compose up` del sistema.
      # Si falta el token, el propio scanner falla con un mensaje claro.
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    volumes:
      - .:/usr/src
    networks:
      - shservices-net
    depends_on:
      - sonarqube
